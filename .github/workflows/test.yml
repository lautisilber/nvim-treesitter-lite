name: Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y gcc g++ git lua5.4

        name: Set default compiler to gcc
        run: |
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc 100
          sudo update-alternatives --set cc /usr/bin/gccA
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++ 100
          sudo update-alternatives --set c++ /usr/bin/g++

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Test TSInstall
        run: bash test/test_install.sh -t 120s

      - name: Test TSUninstall
        run: bash test/test_uninstall.sh -t 120s

      - name: Test TSUpdate
        run: bash test/test_update.sh -t 120s
